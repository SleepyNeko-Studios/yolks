name: Build Java

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 1
  push:
    branches:
      - main
      - feat/**
    paths:
      - java/**
      - SleepyNeko-Studios-Infra-Root-CA.crt
      - .github/workflows/java.yml

env:
  REGISTRY: ghcr.io
  IMAGE_VARIANT: jdk-jammy

jobs:
  push:
    name: 'yolks:java_${{ matrix.tag }}'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        tag:
          - '8'
          - '11'
          - '17'
          - '21'
          - '25'
          - 'latest'
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.REGISTRY_TOKEN }}

      # Setup QEMU for ARM64 Build
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug

      - name: Repository to lowercase
        id: lower-repo
        run: |
          echo "repo=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.lower-repo.outputs.repo }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Determine Base Tag
        id: base-tag
        run: |
          if [[ "${{ matrix.tag }}" == "latest" ]]; then
            echo "tag=25-${{ env.IMAGE_VARIANT }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ matrix.tag }}-${{ env.IMAGE_VARIANT }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./java/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_TAG=${{ steps.base-tag.outputs.tag }}
          tags: ${{ env.REGISTRY }}/${{ steps.lower-repo.outputs.repo }}/yolks:java_${{ matrix.tag }}
